<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Tool Tạo JSON Truyện</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      line-height: 1.6;
      max-width: 600px;
      margin: auto;
    }

    .box {
      border: 2px dashed #ccc;
      padding: 20px;
      text-align: center;
      border-radius: 8px;
      background: #f9f9f9;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    textarea {
      width: 100%;
      height: 200px;
      margin-top: 20px;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <h2>Bộ tạo JSON từ thư mục</h2>
  <div class="box">
    <label>Chọn thư mục chứa các file .txt:</label><br><br>
    <input type="file" id="folderInput" webkitdirectory directory multiple>
  </div>

  <button id="processBtn">Bắt đầu tạo JSON</button>

  <div id="resultArea" style="display:none;">
    <h3>Kết quả JSON:</h3>
    <button id="copyBtn" style="background:#007bff">Copy kết quả</button>
    <button id="downloadBtn" style="background:#6c757d">Tải file .json</button>
    <textarea id="output"></textarea>
  </div>

  <script>
    document.getElementById('processBtn').addEventListener('click', async () => {
      const files = document.getElementById('folderInput').files;
      if (files.length === 0) return alert("Vui lòng chọn thư mục trước!");

      const result = [];

      for (let file of files) {
        // Chỉ lấy file text
        if (file.name.toLowerCase().endsWith('.txt')) {
          const content = await file.text();

          // Lấy câu đầu tiên (dòng đầu tiên) của file
          const firstLine = content.split('\n')[0].trim();

          result.push({
            id: file.name.replace('.txt', ''),
            title: firstLine || "Không có tiêu đề"
          });
        }
      }

      const jsonStr = JSON.stringify(result, null, 2);
      document.getElementById('output').value = jsonStr;
      document.getElementById('resultArea').style.display = 'block';
    });

    // Nút Copy
    document.getElementById('copyBtn').addEventListener('click', () => {
      const area = document.getElementById('output');
      area.select();
      document.execCommand('copy');
      alert("Đã copy vào bộ nhớ tạm!");
    });

    // Nút Tải file
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const data = document.getElementById('output').value;
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'data.json';
      a.click();
    });
  </script>
</body>

</html>
