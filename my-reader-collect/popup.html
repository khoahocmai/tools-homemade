<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: 'Segoe UI', sans-serif;
    }

    .field {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 2px;
    }

    input {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    .auto-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 15px 0;
      background: #f0f7ff;
      padding: 10px;
      border-radius: 6px;
    }

    .auto-group label {
      color: #007bff;
      font-weight: bold;
      margin: 0;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0056b3;
    }

    input[type="checkbox"] {
      width: auto;
    }
  </style>
</head>

<body>
  <h3 style="margin-top: 0; color: #333;">Story Scraper Pro 🚀</h3>

  <div class="field">
    <label>Thẻ Tiêu đề (vd: h1.chapter-title)</label>
    <input type="text" id="titleSelector">
  </div>

  <div class="field">
    <label>Thẻ Nội dung (vd: .cha-content)</label>
    <input type="text" id="contentSelector">
  </div>

  <div class="field">
    <label>Nút "Chương Sau" (vd: #next_chap hoặc .btn-next)</label>
    <input type="text" id="nextSelector" placeholder="Dùng để tự động chuyển chương">
  </div>

  <div class="field">
    <label>Tên Truyện (Prefix)</label>
    <input type="text" id="filename">
  </div>

  <div class="auto-group">
    <input type="checkbox" id="autoMode">
    <label for="autoMode">Bật Chế Độ Tự Động Toàn Tập</label>
  </div>

  <button id="scrapeBtn">Quét & Tải Ngay</button>

  <script src="popup.js"></script>
</body>

</html>
