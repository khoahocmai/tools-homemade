<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>
  <h3 style="margin-top: 0;">Quét Truyện</h3>

  <div class="field">
    <label>Thẻ Tiêu đề (vd: h1 a)</label>
    <input type="text" id="titleSelector" placeholder="Thẻ chứa tên chương">
  </div>

  <div class="field">
    <label>Thẻ Nội dung (vd: #content-chapter p)</label>
    <input type="text" id="contentSelector" placeholder="Thẻ chứa nội dung truyện">
  </div>

  <div class="field">
    <label>Tên file lưu</label>
    <input type="text" id="filename" placeholder="Vd: chuong-49">
  </div>

  <button id="scrapeBtn">Quét & Tải .txt</button>

  <script src="popup.js"></script>
</body>

</html>
