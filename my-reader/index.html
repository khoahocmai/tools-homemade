<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Story Reader</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">📚</div>
        <div>
          <h1>Story Reader</h1>
          <p>Offline reader</p>
        </div>
      </div>

      <div class="search-box">
        <input id="storySearch" type="text" placeholder="Tìm truyện..." />
      </div>


      <div class="sidebar-section">
        <div class="section-title">Thư viện</div>
        <div id="storyList" class="story-list"></div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebarToggleBtn" class="ghost-btn sidebar-toggle-btn" title="Đóng/mở thanh bên">☰</button>
          <button id="backToLibraryBtn" class="ghost-btn hidden">← Thư viện</button>
          <div>
            <h2 id="pageTitle">Thư viện truyện</h2>
            <p id="pageSubtitle">Chọn một truyện để bắt đầu đọc</p>
          </div>
        </div>

        <div class="topbar-right">
          <button id="decreaseFontBtn" class="ghost-btn">A-</button>
          <button id="increaseFontBtn" class="ghost-btn">A+</button>
          <button id="themeToggleBtn" class="ghost-btn">🌙</button>
        </div>
      </header>

      <section id="libraryView" class="view active">
        <div id="libraryGrid" class="library-grid"></div>
      </section>

      <section id="detailView" class="view">
        <div class="story-detail-card">
          <div class="story-detail-header">
            <div>
              <div id="detailBadge" class="detail-badge">Truyện</div>
              <h3 id="detailTitle">Tên truyện</h3>
              <p id="detailMeta" class="detail-meta"></p>
            </div>
            <button id="continueReadingBtn" class="primary-btn">Đọc tiếp</button>
          </div>
          <p id="detailDescription" class="detail-description"></p>
        </div>

        <div class="chapter-panel">
          <div class="section-row">
            <h4>Danh sách chương</h4>
            <span id="chapterCount" class="muted"></span>
          </div>
          <div id="chapterList" class="chapter-list"></div>
        </div>
      </section>

      <section id="readerView" class="view">
        <div class="reader-toolbar">
          <button id="prevChapterBtn" class="ghost-btn">← Chương trước</button>
          <button id="openChapterListBtn" class="ghost-btn">Mục lục</button>
          <button id="nextChapterBtn" class="ghost-btn">Chương sau →</button>
        </div>

        <article class="reader-card">
          <div class="reader-header">
            <p id="readerStoryTitle" class="reader-story-title"></p>
            <h3 id="readerChapterTitle"></h3>
          </div>
          <div id="readerContent" class="reader-content"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>

</html>
