<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Token Extractor</title>
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: white;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: #3b82f6;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .token-box {
      margin-top: 12px;
      padding: 10px;
      background: #1e293b;
      border-radius: 8px;
      font-size: 13px;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.8;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <h2>🔐 Token Extractor</h2>

  <button id="getToken">Get Token (Auto Copy)</button>

  <div id="tokenBox" class="token-box">
    Waiting...
  </div>

  <div id="status" class="status"></div>

  <script src="option.js"></script>
</body>

</html>
