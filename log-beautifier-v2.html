<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Log Flow Analyzer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #fff;
      --border: #e5e7eb;
      --ink: #111827;
      --muted: #6b7280;
      --l-error: #fef2f2;
      --b-error: #fca5a5;
      --t-error: #dc2626;
      --l-warn: #fffbeb;
      --b-warn: #fcd34d;
      --t-warn: #d97706;
      --l-info: #f0fdf4;
      --b-info: #86efac;
      --t-info: #16a34a;
      --l-debug: #f8fafc;
      --b-debug: #cbd5e1;
      --t-debug: #475569;
      --flow-border: #6366f1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace
    }

    .layout {
      display: flex;
      height: 100vh;
      overflow: hidden
    }

    .sidebar {
      width: 260px;
      min-width: 200px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px
    }

    .service-list {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .svc-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      border: 1px solid transparent
    }

    .svc-item:hover {
      background: #f3f4f6
    }

    .svc-item input {
      cursor: pointer;
      accent-color: var(--flow-border)
    }

    .svc-badge {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #4338ca;
      font-weight: 600;
      margin-left: auto
    }

    .svc-item.is-infra .svc-badge {
      background: #fee2e2;
      color: #dc2626
    }

    .sidebar-actions {
      padding: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .btn {
      padding: 7px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      font-size: 12px
    }

    .btn-primary {
      background: #4f46e5;
      color: #fff
    }

    .btn-primary:hover {
      background: #4338ca
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid var(--border)
    }

    .btn-secondary:hover {
      background: #e5e7eb
    }

    .btn-danger {
      background: #fee2e2;
      color: #dc2626;
      border: 1px solid #fca5a5
    }

    .btn-danger:hover {
      background: #fecaca
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .topbar {
      padding: 10px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topbar h1 {
      font-size: 15px;
      font-weight: 700
    }

    .stats {
      display: flex;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap
    }

    .stat {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600
    }

    .stat-error {
      background: var(--l-error);
      color: var(--t-error);
      border: 1px solid var(--b-error)
    }

    .stat-warn {
      background: var(--l-warn);
      color: var(--t-warn);
      border: 1px solid var(--b-warn)
    }

    .stat-flow {
      background: #ede9fe;
      color: #6d28d9;
      border: 1px solid #c4b5fd
    }

    .input-area {
      padding: 10px 16px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border)
    }

    textarea {
      width: 100%;
      height: 120px;
      resize: vertical;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      font: inherit;
      outline: none
    }

    textarea:focus {
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .15)
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .flow-block {
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      background: #eff6ff
    }

    .flow-block.has-error {
      border-color: var(--b-error);
      background: #fff8f8
    }

    .flow-block.has-warn {
      border-color: var(--b-warn);
      background: #fffdf0
    }

    .flow-block.is-anon {
      border-color: #d1d5db;
      background: #f9fafb
    }

    .flow-block.has-error .flow-header {
      background: #fef2f2
    }

    .flow-block.has-warn .flow-header {
      background: #fffbeb
    }

    .flow-block.is-anon .flow-header {
      background: #f3f4f6
    }

    .flow-block .flow-header {
      background: #dbeafe
    }

    .flow-header {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      background: #fafafa;
      border-bottom: 1px solid var(--border)
    }

    .flow-header:hover {
      background: #f3f4f6
    }

    .flow-title {
      font-weight: 700;
      font-size: 13px;
      flex: 1
    }

    .flow-meta {
      font-size: 11px;
      color: var(--muted)
    }

    .flow-badges {
      display: flex;
      gap: 4px
    }

    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      font-weight: 700
    }

    .badge-error {
      background: var(--l-error);
      color: var(--t-error);
      border: 1px solid var(--b-error)
    }

    .badge-warn {
      background: var(--l-warn);
      color: var(--t-warn);
      border: 1px solid var(--b-warn)
    }

    .badge-svc {
      background: #ede9fe;
      color: #6d28d9;
      border: 1px solid #c4b5fd
    }

    .flow-body {
      display: none
    }

    .flow-body.open {
      display: block;
      height: 400px;
      max-height: 1000px;
      min-height: 80px;
      overflow-y: scroll;
      border-top: 1px solid var(--border);
      border-radius: 0 0 10px 10px;
      resize: vertical;
      animation: slideDown .2s ease
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .log-row {
      display: flex;
      gap: 8px;
      padding: 5px 12px;
      border-bottom: 1px solid #f3f4f6;
      align-items: flex-start;
      flex-wrap: wrap
    }

    .log-row:last-child {
      border-bottom: none
    }

    .log-row.level-error {
      background: var(--l-error)
    }

    .log-row.level-warn {
      background: var(--l-warn)
    }

    .log-row.level-debug {
      background: var(--l-debug)
    }

    .log-time {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      min-width: 80px
    }

    .log-level {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      white-space: nowrap;
      min-width: 36px;
      text-align: center
    }

    .ll-error {
      background: var(--l-error);
      color: var(--t-error)
    }

    .ll-warn {
      background: var(--l-warn);
      color: var(--t-warn)
    }

    .ll-info {
      background: var(--l-info);
      color: var(--t-info)
    }

    .ll-debug {
      background: var(--l-debug);
      color: var(--t-debug)
    }

    .log-svc {
      font-size: 11px;
      color: #6d28d9;
      font-weight: 600;
      white-space: nowrap;
      min-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .log-ctx {
      font-size: 11px;
      color: #0369a1;
      white-space: nowrap;
      min-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .log-msg {
      flex: 1;
      word-break: break-word;
      font-size: 12px
    }

    .sql-block {
      margin-top: 6px;
      width: 100%;
      background: #1f2937;
      color: #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
      position: relative;
      font-size: 12px
    }

    .sql-block pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 0
    }

    .sql-copy {
      position: absolute;
      top: 6px;
      right: 6px;
      padding: 3px 8px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, .1);
      background: #374151;
      color: #e5e7eb;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700
    }

    .sql-copy:hover {
      background: #2b3441
    }

    .kw {
      color: #66d9ef;
      font-weight: 700
    }

    .str {
      color: #e6db74
    }

    .num {
      color: #ae81ff
    }

    .ent {
      color: #93c5fd;
      font-weight: 600
    }

    .idn {
      color: #cbd5e1;
      font-weight: 600
    }

    .ungrouped-block {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card)
    }

    .ungrouped-header {
      padding: 8px 12px;
      background: #fafafa;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      user-select: none
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--muted)
    }

    .chevron {
      transition: transform .2s;
      display: inline-block;
      margin-right: 4px
    }

    .chevron.open {
      transform: rotate(90deg)
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap
    }

    .filter-btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      font-weight: 600
    }

    .filter-btn.active {
      background: #4f46e5;
      color: #fff;
      border-color: #4f46e5
    }

    .layout.sidebar-collapsed .sidebar {
      width: 0;
      min-width: 0;
      border-right: none;
      overflow: hidden;
    }

    .layout.sidebar-collapsed .main {
      flex: 1;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: #f3f4f6;
    }

    .time-range-wrap {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      margin-left: auto;
      flex-wrap: nowrap;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    .time-icon {
      color: var(--muted);
      white-space: nowrap;
      font-size: 12px;
    }

    .time-field {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .time-field span {
      font-size: 11px;
      color: #374151;
    }

    .time-field input {
      width: 180px;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font: inherit;
      font-size: 11px;
    }

    .time-reset-btn {
      padding: 4px 8px;
      min-width: auto;
    }

    .topbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    .topbar-row-main {
      flex-wrap: nowrap;
    }

    .topbar-row-sub {
      justify-content: flex-start;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-left: 0;
    }

    .time-range-wrap {
      display: none;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      white-space: nowrap;
    }

    .time-field {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .time-field input {
      width: 170px;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font: inherit;
      font-size: 11px;
    }

    .time-reset-btn {
      padding: 4px 8px;
      min-width: auto;
    }

    @media (max-width: 1200px) {
      .topbar-row-main {
        flex-wrap: wrap;
      }

      .topbar-left,
      .topbar-right {
        width: 100%;
      }

      .topbar-right {
        justify-content: space-between;
      }
    }

    @media (max-width: 900px) {
      .topbar-right {
        flex-wrap: wrap;
        gap: 8px;
      }

      .time-range-wrap {
        order: 1;
      }

      .stats {
        order: 2;
      }

      .time-field input {
        width: 150px;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">🔍 Services</div>
      <div class="sidebar-body">
        <div id="serviceList" class="service-list">
          <div style="color:var(--muted);font-size:12px">Paste log to detect services</div>
        </div>
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
          <div
            style="font-weight:700;font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">
            📃 Flow Names
            <span style="display:flex;gap:4px">
              <button class="btn btn-secondary" style="padding:2px 7px;font-size:10px"
                onclick="toggleAllCtx(true)">All</button>
              <button class="btn btn-secondary" style="padding:2px 7px;font-size:10px"
                onclick="toggleAllCtx(false)">None</button>
            </span>
          </div>
          <div id="contextList" class="service-list" style="max-height:200px;overflow-y:auto"></div>
        </div>
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
          <div
            style="font-weight:700;font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">
            🏷 Log Contexts
            <span style="display:flex;gap:4px">
              <button class="btn btn-secondary" style="padding:2px 7px;font-size:10px"
                onclick="toggleAllLogCtx(true)">All</button>
              <button class="btn btn-secondary" style="padding:2px 7px;font-size:10px"
                onclick="toggleAllLogCtx(false)">None</button>
            </span>
          </div>
          <div id="logContextList" class="service-list" style="max-height:200px;overflow-y:auto"></div>
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="btn btn-primary" onclick="onlyServices()">✅ Only service-*</button>
        <button class="btn btn-secondary" onclick="toggleAll(true)">☑ Select All</button>
        <button class="btn btn-secondary" onclick="toggleAll(false)">☐ Deselect All</button>
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <div class="topbar-row topbar-row-main">
          <div class="topbar-left">
            <button class="icon-btn" id="toggleSidebarBtn" onclick="toggleSidebar()">☰</button>
            <span>🛠️</span>
            <h1>Log Flow Analyzer</h1>

            <div class="filter-bar">
              <button class="filter-btn active" id="fAll" onclick="setLevelFilter('all')">All</button>
              <button class="filter-btn" id="fError" onclick="setLevelFilter('error')">🔴 Errors only</button>
              <button class="filter-btn" id="fWarn" onclick="setLevelFilter('warn')">🟡 Warn+</button>
              <button class="filter-btn" id="btnCollapseAll" onclick="collapseAll()">⊟ Collapse All</button>
            </div>

            <input type="file" id="fileInput" accept=".txt,.log,.json,.out" onchange="importLogFile(event)"
              style="display:none" />
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📂 Import
              log</button>
          </div>
        </div>

        <div class="topbar-row topbar-row-sub">
          <div class="topbar-right">
            <div id="timeRangeWrap" class="time-range-wrap">
              <span class="time-icon">🕐</span>

              <label class="time-field">
                <span>Từ</span>
                <input type="datetime-local" id="timeFromInput" onchange="onTimeInputChange()" />
              </label>

              <label class="time-field">
                <span>Đến</span>
                <input type="datetime-local" id="timeToInput" onchange="onTimeInputChange()" />
              </label>

              <button class="filter-btn time-reset-btn" onclick="resetTimeInputs()">✕</button>
            </div>

            <div class="stats" id="stats"></div>
          </div>
        </div>
      </div>
      <div class="input-area">
        <textarea id="input" placeholder="Paste docker-compose logs here..." spellcheck="false"></textarea>
      </div>
      <div class="content" id="output">
        <div class="empty">Paste log above to start analyzing</div>
      </div>
    </div>
  </div>

  <script>
    const INFRA = ['kong', 'mongodb', 'watchtower', 'redis', 'postgres', 'mysql', 'nginx', 'rabbitmq', 'kafka', 'zookeeper'];
    const LEVEL_MAP = {
      10: 'debug',
      20: 'info',
      30: 'info',
      40: 'warn',
      50: 'error',
      60: 'error',
      TRACE: 'debug',
      DEBUG: 'debug',
      INFO: 'info',
      WARN: 'warn',
      WARNING: 'warn',
      ERROR: 'error',
      FATAL: 'error'
    };
    const SKIP_CTX = new Set(['ElasticAPMService', 'ElasticAPMInterceptor']);

    let allEntries = [];
    let serviceChecks = {};
    let contextChecks = {};
    let logContextChecks = {};
    let levelFilter = 'all';

    function parseLevel(n) {
      if (typeof n === 'string') return LEVEL_MAP[n.toUpperCase()] || 'info';
      return LEVEL_MAP[n] || (n >= 50 ? 'error' : n >= 40 ? 'warn' : n >= 30 ? 'info' : 'debug');
    }

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[c]));
    }

    function splitRawLogBlocks(raw) {
      const lines = raw.split(/\r?\n/);
      const blocks = [];
      let current = '';

      const isStartLine = (line) => {
        const t = line.trim();
        if (!t) return false;
        return (
          /^\[\d{2}:\d{2}:\d{2}\.\d{3}\]\s+[A-Z]+\s+\(\d+\):/.test(t) || // [09:46:27.349] INFO (15204):
          /^\S+\s*\|\s*\{/.test(t) ||                                      // service | {...}
          /^\{.+\}$/.test(t)                                               // pure json
        );
      };

      for (const line of lines) {
        if (!line.trim()) continue;

        if (isStartLine(line)) {
          if (current) blocks.push(current);
          current = line;
        } else {
          current += '\n' + line;
        }
      }

      if (current) blocks.push(current);
      return blocks;
    }

    function safeJsonTailParse(text) {
      const idx = text.indexOf('{');
      if (idx < 0) return { msg: text.trim(), obj: null };

      const head = text.slice(0, idx).trim();
      const tail = text.slice(idx).trim();

      try {
        return { msg: head, obj: JSON.parse(tail) };
      } catch {
        return { msg: text.trim(), obj: null };
      }
    }

    function deriveServiceFromPino(obj, fallback = '_unknown') {
      if (!obj) return fallback;

      if (obj.context === 'TypeORM') return 'database';
      if (obj.context === 'ConnectionManager') return 'database';
      if (obj.context === 'MultiTenancyFactory') return 'tenancy';
      if (obj.context === 'TokenService') return 'auth';
      if (obj.context === 'AppAuthGuard') return 'auth';
      if (obj.context === 'PermissionChecker') return 'auth';

      if (obj.req?.url?.includes('/graphql')) return 'graphql';
      return fallback;
    }

    function parseEntries(raw) {
      const entries = [];
      const seen = new Set();
      const blocks = splitRawLogBlocks(raw);

      for (const block of blocks) {
        const t = block.trim();
        if (!t) continue;
        if (seen.has(t)) continue;
        seen.add(t);

        // 1) docker-compose style: service | {json}
        let m = t.match(/^(\S+)\s*\|\s*(\{[\s\S]*\})$/);
        if (m) {
          let service = m[1];
          let obj = null;

          try {
            obj = JSON.parse(m[2]);
          } catch {
            entries.push({
              service,
              level: 'info',
              msg: m[2].slice(0, 300),
              time: null,
              context: '',
              raw: t,
              isJson: false
            });
            continue;
          }

          if (SKIP_CTX.has(obj.context)) continue;
          const level = parseLevel(obj.level);
          const ts = obj.time ? new Date(obj.time) : null;

          entries.push({
            service,
            level,
            msg: obj.msg || obj.message || '',
            time: Number.isNaN(ts?.getTime()) ? null : ts,
            context: obj.context || '',
            raw: t,
            isJson: true,
            obj
          });
          continue;
        }

        // 2) pure json
        if (t.startsWith('{')) {
          try {
            const obj = JSON.parse(t);
            if (SKIP_CTX.has(obj.context)) continue;

            const service = deriveServiceFromPino(obj, deriveServiceName?.(obj, '_unknown') || '_unknown');
            const level = parseLevel(obj.level);
            const ts = obj.time ? new Date(obj.time) : null;

            entries.push({
              service,
              level,
              msg: obj.msg || obj.message || '',
              time: Number.isNaN(ts?.getTime()) ? null : ts,
              context: obj.context || '',
              raw: t,
              isJson: true,
              obj
            });
            continue;
          } catch { }
        }

        // 3) pino text style:
        // [09:46:27.349] INFO (15204): request completed {...}
        m = t.match(/^\[(\d{2}:\d{2}:\d{2}\.\d{3})\]\s+([A-Z]+)\s+\((\d+)\):\s*([\s\S]*)$/);
        if (m) {
          const [, timeStr, levelStr, pid, rest] = m;
          const { msg, obj } = safeJsonTailParse(rest);

          if (obj && SKIP_CTX.has(obj.context)) continue;

          let service = '_unknown';
          if (obj) {
            service =
              deriveServiceFromPino(obj, '_unknown') ||
              deriveServiceName?.(obj, '_unknown') ||
              '_unknown';
          }

          entries.push({
            service,
            level: parseLevel(levelStr),
            msg,
            time: null, // log này chỉ có HH:mm:ss.SSS, chưa có ngày
            displayTime: timeStr,
            pid,
            context: obj?.context || '',
            raw: t,
            isJson: !!obj,
            obj
          });
          continue;
        }

        // 4) fallback plain text
        entries.push({
          service: '_unknown',
          level: 'info',
          msg: t,
          time: null,
          context: '',
          raw: t,
          isJson: false
        });
      }

      return entries;
    }




    function highlightSQL(sql) {
      let work = sql;
      const dq = [];
      work = work.replace(/"([^"]*)"/g, (m, id) => { const i = dq.length; dq.push(id); return `__DQ${i}__`; });
      const sq = [];
      work = work.replace(/'(?:''|[^'])*'/g, m => { const i = sq.length; sq.push(m); return `__SQ${i}__`; });
      let t = escHtml(work);
      t = t.replace(/\b(SELECT|FROM|WHERE|AND|OR|JOIN|LEFT|RIGHT|INNER|FULL|CROSS|ON|IN|AS|IS|TRUE|FALSE|NOT|NULL|UPDATE|SET|INSERT|INTO|VALUES|DELETE|RETURNING|GROUP\s+BY|HAVING|ORDER\s+BY|LIMIT|OFFSET|BETWEEN|DISTINCT|COUNT|EXISTS|CASE|WHEN|THEN|ELSE|END)\b/gi, m => `<span class="kw">${m}</span>`);
      t = t.replace(/\b\d+(\.\d+)?\b/g, m => `<span class="num">${m}</span>`);
      dq.forEach((id, i) => { t = t.replace(`__DQ${i}__`, `<span class="${/entity/i.test(id) || /__/.test(id) ? 'ent' : 'idn'}">${escHtml('"' + id + '"')}</span>`); });
      sq.forEach((s, i) => { t = t.replace(`__SQ${i}__`, `<span class="str">${escHtml(s)}</span>`); });
      return t;
    }

    function beautifySQL(sql) {
      return sql
        .replace(/\bSELECT\b/gi, 'SELECT\n  ').replace(/,\s*/g, ',\n  ')
        .replace(/\bFROM\b/gi, '\nFROM\n  ')
        .replace(/\b(LEFT|RIGHT|INNER|FULL|CROSS)?\s*JOIN\b/gi, m => `\n${m.trim()}\n  `)
        .replace(/\bWHERE\b/gi, '\nWHERE\n  ').replace(/\bAND\b/gi, '\n  AND ').replace(/\bOR\b/gi, '\n  OR ')
        .replace(/\bORDER\s+BY\b/gi, '\nORDER BY\n  ').replace(/\bGROUP\s+BY\b/gi, '\nGROUP BY\n  ')
        .replace(/\bLIMIT\b/gi, '\nLIMIT ').replace(/\bOFFSET\b/gi, '\nOFFSET ')
        .replace(/\bSET\b/gi, '\nSET\n  ').replace(/\bVALUES\b/gi, '\nVALUES\n  ')
        .replace(/\bRETURNING\b/gi, '\nRETURNING\n  ')
        .replace(/\n\s*\n/g, '\n').trim();
    }

    function injectParams(query, params) {
      if (!params || !params.length) return query;
      if (/\$\d+/.test(query)) return query.replace(/\$(\d+)/g, (_, n) => { const v = params[Number(n) - 1]; return typeof v === 'string' ? `'${v.replace(/'/g, "''")}'` : String(v ?? 'NULL'); });
      let i = 0; return query.replace(/\?/g, () => { const v = params[i++]; return typeof v === 'string' ? `'${v.replace(/'/g, "''")}'` : String(v ?? 'NULL'); });
    }

    let logMinTs = 0, logMaxTs = 0, sliderFromTs = 0, sliderToTs = 0;

    function fmtLabel(ts) {
      return new Date(ts).toISOString().replace('T', ' ').replace(/\.\d+Z$/, '');

    function initSlider(entries) {
      const times = entries.map(e => e.time?.getTime()).filter(Boolean);
      if (!times.length) {
        document.getElementById('timeRangeWrap').style.display = 'none';
        logMinTs = 0;
        logMaxTs = 0;
        sliderFromTs = 0;
        sliderToTs = 0;
        return;
      }

      logMinTs = Math.min(...times);
      logMaxTs = Math.max(...times);
      sliderFromTs = logMinTs;
      sliderToTs = logMaxTs;

      document.getElementById('timeRangeWrap').style.display = 'flex';
      document.getElementById('timeFromInput').value = toLocalDatetimeValue(logMinTs);
      document.getElementById('timeToInput').value = toLocalDatetimeValue(logMaxTs);

    function toLocalDatetimeValue(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function onTimeInputChange() {
      const fromVal = document.getElementById('timeFromInput').value;
      const toVal = document.getElementById('timeToInput').value;

      sliderFromTs = fromVal ? new Date(fromVal).getTime() : logMinTs;
      sliderToTs = toVal ? new Date(toVal).getTime() : logMaxTs;

      if (sliderFromTs > sliderToTs) {
        const temp = sliderFromTs;
        sliderFromTs = sliderToTs;
        sliderToTs = temp;
      }

      render();
    }

    function resetTimeInputs() {
      if (!logMinTs || !logMaxTs) return;
      document.getElementById('timeFromInput').value = toLocalDatetimeValue(logMinTs);
      document.getElementById('timeToInput').value = toLocalDatetimeValue(logMaxTs);
      sliderFromTs = logMinTs;
      sliderToTs = logMaxTs;
      render();
    }

    function setLevelFilter(f) {
      levelFilter = f;
      ['all', 'error', 'warn'].forEach(x => document.getElementById('f' + x.charAt(0).toUpperCase() + x.slice(1))?.classList.toggle('active', x === f));
      render();
    }

    function groupFlows(entries) {
      const flows = [];
      let current = null;
      for (const e of entries) {
        const isFlowStart = e.context === 'AppAuthGuard' && e.msg.includes('📃Context name:');
        if (isFlowStart) {
          const name = e.msg.replace(/.*📃Context name:\s*/, '').trim();
          current = { name, service: e.service, startTime: e.time, entries: [e], hasError: false, hasWarn: false, isAnon: false };
          flows.push(current);
        } else if (current) {
          current.entries.push(e);
          if (e.level === 'error') current.hasError = true;
          if (e.level === 'warn') current.hasWarn = true;
          if (e.msg.includes('Anonymous Request')) current.isAnon = true;
        } else {
          flows.push({ name: null, service: e.service, startTime: e.time, entries: [e], hasError: e.level === 'error', hasWarn: e.level === 'warn', isAnon: false });
        }
      }
      return flows;
    }

    function fmtTime(ts) {
      if (!ts) return '';
      return ts.toISOString().replace('T', ' ').replace(/\.\d+Z$/, '');
    }

    function relTime(ts, base) {
      if (!ts || !base) return '';
      const d = ts - base;
      return d >= 0 ? `+${d}ms` : `${d}ms`;
    }

    function levelClass(l) { return { error: 'll-error', warn: 'll-warn', info: 'll-info', debug: 'll-debug' }[l] || 'll-debug'; }
    function rowClass(l) { return { error: 'level-error', warn: 'level-warn', debug: 'level-debug' }[l] || ''; }

    function renderLogRow(e, base) {
      const div = document.createElement('div');
      div.className = 'log-row ' + rowClass(e.level);
      const rel = relTime(e.time, base);

      const isSQL = e.isJson && e.context === 'TypeORM' && e.obj?.query &&
        /\b(SELECT|INSERT|UPDATE|DELETE)\b/i.test(e.obj.query) &&
        !/^(SELECT 1|START TRANSACTION|COMMIT|ROLLBACK)$/i.test(e.obj.query.trim());

      const msgHtml = isSQL ? escHtml('SQL query') : escHtml(e.msg);
      div.innerHTML = `<span class="log-time">${rel || fmtTime(e.time)}</span>
      <span class="log-level ${levelClass(e.level)}">${e.level.toUpperCase()}</span>
      <span class="log-svc" title="${e.service}">${e.service}</span>
      <span class="log-ctx" title="${e.context}">${e.context}</span>
      <span class="log-msg">${msgHtml}</span>`;

      const shownTime = rel || e.displayTime || fmtTime(e.time);
      div.innerHTML = `<span class="log-time">${shownTime || ''}</span>
      <span class="log-level ${levelClass(e.level)}">${e.level.toUpperCase()}</span>
      <span class="log-svc" title="${e.service}">${e.service}</span>
      <span class="log-ctx" title="${e.context}">${e.context}</span>
      <span class="log-msg">${msgHtml}</span>`;

      if (isSQL) {
        const interpolated = injectParams(e.obj.query, e.obj.parameters || []);
        const formatted = beautifySQL(interpolated);

        const sqlWrap = document.createElement('div');
        sqlWrap.style.width = '100%';
        sqlWrap.style.marginTop = '6px';

        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'filter-btn';
        toggleBtn.textContent = '▶ Show SQL';
        toggleBtn.style.marginBottom = '6px';

        const sqlBlock = document.createElement('div');
        sqlBlock.className = 'sql-block';
        sqlBlock.style.width = '100%';
        sqlBlock.style.display = 'none';

        const btn = document.createElement('button');
        btn.className = 'sql-copy';
        btn.textContent = '📋 Copy';
        btn.onclick = ev => {
          ev.stopPropagation();
          copyText(formatted);
        };

        const pre = document.createElement('pre');
        pre.innerHTML = highlightSQL(formatted);

        toggleBtn.onclick = ev => {
          ev.stopPropagation();
          const isOpen = sqlBlock.style.display !== 'none';
          sqlBlock.style.display = isOpen ? 'none' : 'block';
          toggleBtn.textContent = isOpen ? '▶ Show SQL' : '▼ Hide SQL';
        };

        sqlBlock.appendChild(btn);
        sqlBlock.appendChild(pre);
        sqlWrap.appendChild(toggleBtn);
        sqlWrap.appendChild(sqlBlock);
        div.appendChild(sqlWrap);
      }
      return div;
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) await navigator.clipboard.writeText(text);
        else { const el = Object.assign(document.createElement('textarea'), { value: text }); document.body.appendChild(el); el.select(); document.execCommand('copy'); el.remove(); }
        alert('✅ Copied!');
      } catch (e) { alert('⚠️ ' + e.message); }
    }

    function render() {
      const filtered = allEntries.filter(e => serviceChecks[e.service] !== false);
      const levelFiltered = filtered.filter(e => {
        if (levelFilter === 'error') return e.level === 'error';
        if (levelFilter === 'warn') return e.level === 'error' || e.level === 'warn';
        return true;
      });

      const fromTs = logMinTs < logMaxTs ? sliderFromTs : null;
      const toTs = logMinTs < logMaxTs ? sliderToTs : null;

      const flows = groupFlows(levelFiltered);
      const namedFlows = flows.filter(f => {
        if (!f.name || contextChecks[f.name] === false) return false;
        if (fromTs && f.startTime && f.startTime.getTime() < fromTs) return false;
        if (toTs && f.startTime && f.startTime.getTime() > toTs) return false;
        return true;
      });
      const ungrouped = flows.filter(f => !f.name).flatMap(f => f.entries);

      let errCount = 0, warnCount = 0;
      filtered.forEach(e => { if (e.level === 'error') errCount++; else if (e.level === 'warn') warnCount++; });

      document.getElementById('stats').innerHTML = `
      <span class="stat stat-flow">${namedFlows.length} flows</span>
      ${errCount ? `<span class="stat stat-error">🔴 ${errCount} errors</span>` : ''}
      ${warnCount ? `<span class="stat stat-warn">🟡 ${warnCount} warnings</span>` : ''}`;

      const out = document.getElementById('output');
      out.innerHTML = '';

      if (!filtered.length) { out.innerHTML = '<div class="empty">No entries match current filters</div>'; return; }

      for (const flow of namedFlows) {
        const block = document.createElement('div');
        block.className = 'flow-block' + (flow.hasError ? ' has-error' : flow.hasWarn ? ' has-warn' : flow.isAnon ? ' is-anon' : '');

        const services = [...new Set(flow.entries.map(e => e.service))];
        const header = document.createElement('div');
        header.className = 'flow-header';
        header.innerHTML = `<span class="chevron open">▶</span>
        <span class="flow-title">📃 ${escHtml(flow.name)}</span>
        <span class="flow-meta">${fmtTime(flow.startTime)} • ${flow.entries.length} logs</span>
        <div class="flow-badges">
          ${flow.hasError ? '<span class="badge badge-error">ERROR</span>' : ''}
          ${flow.hasWarn ? '<span class="badge badge-warn">WARN</span>' : ''}
          ${flow.isAnon ? '<span class="badge" style="background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db">🕵️ Anon</span>' : ''}
          ${services.map(s => `<span class="badge badge-svc">${s}</span>`).join('')}
        </div>`;

        const body = document.createElement('div');
        body.className = 'flow-body open';
        const base = flow.startTime;
        for (const e of flow.entries) {
          if (e.context && logContextChecks[e.context] === false) continue;
          body.appendChild(renderLogRow(e, base));
        }

        header.onclick = () => { const ch = header.querySelector('.chevron'); body.classList.toggle('open'); ch.classList.toggle('open'); };
        block.appendChild(header);
        block.appendChild(body);
        out.appendChild(block);
      }

      if (ungrouped.length) {
        const block = document.createElement('div');
        block.className = 'ungrouped-block';
        const hdr = document.createElement('div');
        hdr.className = 'ungrouped-header';
        hdr.innerHTML = `<span class="chevron">▶</span> Other logs (${ungrouped.length})`;
        const body = document.createElement('div');
        body.className = 'flow-body';
        for (const e of ungrouped) body.appendChild(renderLogRow(e, null));
        hdr.onclick = () => { const ch = hdr.querySelector('.chevron'); body.classList.toggle('open'); ch.classList.toggle('open'); };
        block.appendChild(hdr);
        block.appendChild(body);
        out.appendChild(block);
      }
    }

    document.getElementById('input').addEventListener('input', function () {
      allEntries = parseEntries(this.value);
      initSlider(allEntries);
      const svcMap = detectServices(allEntries);
      for (const s of Object.keys(svcMap)) { if (serviceChecks[s] === undefined) serviceChecks[s] = !isInfra(s); }
      for (const s of Object.keys(serviceChecks)) { if (!svcMap[s]) delete serviceChecks[s]; }
      renderServiceList(svcMap);
      const ctxMap = detectContexts(allEntries);
      for (const c of Object.keys(ctxMap)) { if (contextChecks[c] === undefined) contextChecks[c] = true; }

      renderContextList(ctxMap);
      const logCtxMap = detectLogContexts(allEntries);
      for (const c of Object.keys(logCtxMap)) { if (logContextChecks[c] === undefined) logContextChecks[c] = true; }
      for (const c of Object.keys(logContextChecks)) { if (!logCtxMap[c]) delete logContextChecks[c]; }
      renderLogContextList(logCtxMap);
      render();

    function importLogFile(event) {
      const file = event.target.files?.[0];

      const reader = new FileReader();
      reader.onload = function (e) {
        const content = e.target?.result || '';

    function deriveServiceName(obj, fallback = '_unknown') {
      if (obj?.service) return obj.service;

      const hostname = obj?.hostname || '';
      if (!hostname) return fallback;

      // Ví dụ: staging-service-customers-544f6ffc6d-s26lc
      // -> service-customers
      const m = hostname.match(/(?:^|[-_])(service-[a-z0-9-]+?)(?:-[a-f0-9]{6,}-[a-z0-9]+)?$/i);
      if (m) return m[1];

      // fallback khác: lấy hostname luôn
      return hostname;
    }
  </script>
